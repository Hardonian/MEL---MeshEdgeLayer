# Merge gate: Go fmt/vet, full `go test ./...`, build, smoke, plus frontend typecheck/tests.
name: ci
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: false
      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y sqlite3 protobuf-compiler curl
      - name: Verify protobuf descriptor
        run: ./scripts/verify-proto.sh
      - name: Fail on dirty tree after generation
        run: git diff --exit-code
      - name: Format
        run: gofmt -w $(find . -name '*.go' -not -path './vendor/*')
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: make build
      - name: Smoke
        run: ./scripts/smoke.sh

  frontend-install-churn-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify chained release frontend install count
        run: make check-frontend-install-churn

  frontend-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: false
      - name: Install frontend deps (retry on transient failures)
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci failed on attempt $i, retrying..."
            sleep 10
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
          done
      - name: Frontend tests
        run: npm test
      - name: Frontend typecheck
        run: npm run typecheck

  site-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: false
      - name: Install site deps (retry on transient failures)
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci failed on attempt $i, retrying..."
            sleep 10
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
          done
      - name: Site lint
        run: npm run lint
      - name: Site typecheck
        run: npm run typecheck
      - name: Site production build
        run: npm run build
