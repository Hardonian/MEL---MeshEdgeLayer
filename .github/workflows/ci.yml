# Merge gate: Go fmt/vet, full `go test ./...`, build, smoke, plus frontend typecheck/tests.
name: ci
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y sqlite3 protobuf-compiler curl
      - name: Verify protobuf descriptor
        run: ./scripts/verify-proto.sh
      - name: Fail on dirty tree after generation
        run: git diff --exit-code
      - name: Format
        run: gofmt -w $(find . -name '*.go' -not -path './vendor/*')
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: make build
      - name: Smoke
        run: ./scripts/smoke.sh

  frontend-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Frontend typecheck
        run: npm run typecheck
