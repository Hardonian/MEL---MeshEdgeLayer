syntax = "proto3";
package meshtastic;
message Position {
  optional sfixed32 latitude_i = 1;
  optional sfixed32 longitude_i = 2;
  optional int32 altitude = 3;
}
message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4;
  int32 hw_model = 5;
  bool is_licensed = 6;
  int32 role = 7;
  bytes public_key = 8;
  optional bool is_unmessagable = 9;
}
message Data {
  int32 portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  fixed32 emoji = 8;
  optional uint32 bitfield = 9;
}
message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;
  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }
  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  int32 priority = 11;
  int32 rx_rssi = 12;
  int32 delayed = 13;
  bool via_mqtt = 14;
  uint32 hop_start = 15;
  bytes public_key = 16;
  bool pki_encrypted = 17;
  uint32 next_hop = 18;
  uint32 relay_node = 19;
  uint32 tx_after = 20;
}
